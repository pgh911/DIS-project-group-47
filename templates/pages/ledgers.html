<!doctype html>
<html>
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='dist/output.css') }}"
    />

    <title>Ledgers</title>
  </head>
  <body>
    <div class="v-screen">
        {% from "components/header.html" import header %}
        {{header("Ledgers")}}

        <div class="flex h-4/5">
            {% include "components/logout.html" %}
            {% from "components/ledger.html" import ledger %}
            
            {% for l in ledgers %}
                {{ ledger(l) }}
            {% endfor %}

            <form method="POST" action="/ledgers">
                <input type="text" name="ledger_name" placeholder="Enter ledger name" required />
                <button type="submit">Add Ledger</button>
            </form>
          
        </div>

    </div>
    
  </body>
</html>
