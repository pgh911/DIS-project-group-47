<!doctype html>
<html>
	<head>
		<!-- Required meta tags -->
		<meta charset="utf-8" />
		<meta
		name="viewport"
		content="width=device-width, initial-scale=1, shrink-to-fit=no"
		/>

		<link
		rel="stylesheet"
		type="text/css"
		href="{{ url_for('static', filename='dist/output.css') }}"
		/>
		<title>Ledger {{ ledger.ledger_name }}</title>
	</head>
	<body>
		{% from "components/header.html" import header %}
		{{header(ledger.ledger_name)}}
		<hr />
        <a href="/ledgers">Gå tilbage</a>
		</ul>
		<section>
			<h2>Postings</h2>
			<ul>
				{% for post in postings %}
                <li>
					<div>
						{{ post.amount }}
                        {{ post.description }}
                        {{ post.created }}
                    </div>
                </li>
				{% endfor %}
			</ul>
		</section>
		</body>
</html>
