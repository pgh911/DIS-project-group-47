<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, shrink-to-fit=no" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />

	</head>
	<body>
		<div class="d-flex vh-100">
			<!-- Left panel (2/5 width) -->
			<div class="w-40 bg-white d-flex align-items-center justify-content-center" style="width: 40%;">
			<div class="bg-light rounded p-4" style="width: 16rem;">
				<form action="/register" method="POST">
				<h3 class="mb-3">Register</h3>

				<p class="mb-1">Email</p>
				<input type="text" required name="email"
					pattern=".+@(gruppe47\..+|group47\..+)"
					title="Email must be in the format: [user]@gruppe47.[domain] or [user]@group47.[domain]"
					class="form-control mb-2" />

				<p class="mb-1">Password</p>
				<input type="password" name="password" required minlength="8"
					class="form-control mb-3" />
				<input type="password" id="password_repeat" name="password_repeat" required minlength="8"
					class="form-control mb-3" />

				<button type="submit" class="btn btn-dark w-100 mb-2">
					Register
				</button>
				</form>
				<script>
					const form = document.querySelector('form');
					const pw = form.querySelector('[name="password"]');
					const pw2 = document.getElementById('password_repeat');
					pw2.addEventListener('input', () => {
						pw2.setCustomValidity(pw2.value !== pw.value ? 'Passwords do not match' : '');
					});
					pw.addEventListener('input', () => {
						pw2.setCustomValidity(pw2.value && pw2.value !== pw.value ? 'Passwords do not match' : '');
					});
				</script>
			</div>
			</div>

			<!-- Right panel (3/5 width) -->
			<div class="flex-fill" style="background-color: #c7d2fe;"></div>
		</div>
	</body>
</html>
