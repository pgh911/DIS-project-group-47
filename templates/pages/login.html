<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>

<body>
  <div class="d-flex vh-100">
    <!-- Left panel (2/5 width) -->
    <div class="w-40 bg-white d-flex align-items-center justify-content-center" style="width: 40%;">
      <div class="bg-light rounded p-4" style="width: 16rem;">
        <form action="/login" method="POST">
          <h3 class="mb-3">Login</h3>

          <p class="mb-1">Email</p>
          <input type="text" required name="username"
            class="form-control mb-2" />

          <p class="mb-1">Password</p>
          <input type="password" name="password" required
            class="form-control mb-3" />

          <button type="submit" class="btn btn-dark w-100 mb-2">
            Login
          </button>
        </form>

        <a href="/register" class="d-block">
          <button class="btn btn-dark w-100">
            Register
          </button>
        </a>
      </div>
    </div>

    <!-- Right panel (3/5 width) -->
    <div class="flex-fill" style="background-color: #c7d2fe;"></div>
  </div>
</body>

</html>
